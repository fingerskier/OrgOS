services:
  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    environment:
      POSTGRES_USER: orgos
      POSTGRES_PASSWORD: orgos
      POSTGRES_DB: orgos
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orgos -d orgos"]
      interval: 2s
      timeout: 3s
      retries: 30
